<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fully Working Setup</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Dependency-free starter</p>
        <h1 id="page-title">Your repo is ready to run.</h1>
        <p class="lede">
          A compact web app with a local server, tests, linting, and enough structure to start building immediately.
        </p>
        <div class="actions">
          <a class="button primary" href="/health">Health check</a>
          <a class="button" href="https://nodejs.org/en/learn/getting-started/introduction-to-nodejs">Node basics</a>
        </div>
      </section>

      <section class="status" aria-label="Project status">
        <article>
          <span class="metric" data-status-label>Ready</span>
          <p>Server status</p>
        </article>
        <article>
          <span class="metric">0</span>
          <p>Runtime dependencies</p>
        </article>
        <article>
          <span class="metric">3</span>
          <p>Useful commands</p>
        </article>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
